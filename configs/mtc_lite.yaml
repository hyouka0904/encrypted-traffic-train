# Future sequence pipeline config — NOT compatible with training/main.py (ARFF tabular path).
# Requires data/sequence/iscx_vpn_sequence.npz and a sequence-aware training entry point.

model:
  name: mtc_lite
  params:
    max_packets: 32
    num_packet_features: 3
    hidden_dim: 64
    cnn_channels: 64
    transformer_layers: 2
    transformer_heads: 4
    dropout: 0.2
  train_params:
    epochs: 50
    lr: 0.001
    batch_size: 128

data:
  sequence_path: data/sequence/iscx_vpn_sequence.npz

output:
  dir: models
  name: mtc_lite
